name: Ping

on:
  schedule:
    # 22:20 Singapore time (UTC+8) = 14:20 UTC
    - cron: "20 14 * * *"
  workflow_dispatch:

  push:
    branches:
      - "**"   # run on any branch push

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      TOKEN: ${{ secrets.TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir requests

      - name: Run checker
        run: python main.py
